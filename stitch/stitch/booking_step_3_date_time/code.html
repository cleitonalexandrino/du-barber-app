<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Du Barber House - Agendamento</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: "hsl(240 3.7% 15.9%)",
            background: "hsl(240 10% 3.9%)",
            foreground: "hsl(0 0% 98%)",
            primary: {
              DEFAULT: "#3B82F6",
              foreground: "#ffffff",
            },
            destructive: {
              DEFAULT: "#EF4444",
              foreground: "#ffffff",
            },
            card: "hsl(240 10% 3.9%)",
            accent: "hsl(240 3.7% 15.9%)",
          }
        }
      }
    }
  </script>
<style data-purpose="custom-scroll">
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-background text-foreground min-h-screen flex flex-col font-sans antialiased">
<!-- BEGIN: MainHeader -->
<header class="sticky top-0 z-50 w-full border-b border-border bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60">
<div class="container flex h-16 items-center px-4">
<div class="flex items-center gap-4">
<!-- Back Arrow Button -->
<button class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground h-10 w-10">
<svg class="lucide lucide-chevron-left" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m15 18-6-6 6-6"></path></svg>
</button>
<h1 class="text-xl font-semibold tracking-tight">Data e Hora</h1>
</div>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: MainContent -->
<main class="flex-1 overflow-y-auto px-4 py-6 space-y-8 max-w-md mx-auto w-full">
<!-- BEGIN: DateSelection -->
<section data-purpose="date-picker-section">
<div class="flex items-center justify-between mb-4">
<h2 class="text-sm font-medium text-muted-foreground uppercase tracking-wider">Selecione o dia</h2>
<span class="text-xs text-zinc-500">Próximos 7 dias</span>
</div>
<!-- Horizontal Date Picker Container -->
<div class="flex overflow-x-auto gap-3 pb-2 no-scrollbar" id="date-scroll-container">
<!-- Monday (Selected Example) -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-20 rounded-xl border-2 border-primary bg-primary/10 text-primary transition-all">
<span class="text-xs font-semibold uppercase">Seg</span>
<span class="text-lg font-bold">22</span>
</button>
<!-- Tuesday -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-20 rounded-xl border border-border bg-card hover:bg-accent transition-all">
<span class="text-xs font-semibold uppercase text-zinc-500">Ter</span>
<span class="text-lg font-bold">23</span>
</button>
<!-- Wednesday -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-20 rounded-xl border border-border bg-card hover:bg-accent transition-all">
<span class="text-xs font-semibold uppercase text-zinc-500">Qua</span>
<span class="text-lg font-bold">24</span>
</button>
<!-- Thursday -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-20 rounded-xl border border-border bg-card hover:bg-accent transition-all">
<span class="text-xs font-semibold uppercase text-zinc-500">Qui</span>
<span class="text-lg font-bold">25</span>
</button>
<!-- Friday -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-20 rounded-xl border border-border bg-card hover:bg-accent transition-all">
<span class="text-xs font-semibold uppercase text-zinc-500">Sex</span>
<span class="text-lg font-bold">26</span>
</button>
<!-- Saturday -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-20 rounded-xl border border-border bg-card hover:bg-accent transition-all">
<span class="text-xs font-semibold uppercase text-zinc-500">Sáb</span>
<span class="text-lg font-bold">27</span>
</button>
<!-- Sunday -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-20 rounded-xl border border-border bg-card hover:bg-accent transition-all">
<span class="text-xs font-semibold uppercase text-zinc-500">Dom</span>
<span class="text-lg font-bold">28</span>
</button>
</div>
</section>
<!-- END: DateSelection -->
<!-- BEGIN: TimeSelection -->
<section data-purpose="time-picker-section">
<div class="flex items-center justify-between mb-4">
<h2 class="text-sm font-medium text-muted-foreground uppercase tracking-wider">Horários disponíveis</h2>
<span class="text-xs text-zinc-500">Duração: 60 min</span>
</div>
<!-- Time Grid -->
<div class="grid grid-cols-3 gap-3" id="time-grid">
<!-- 09:00 (Selected Example) -->
<button class="py-3 px-4 rounded-lg border-2 border-primary bg-primary text-white font-medium text-center shadow-lg shadow-primary/20 transition-all">
          09:00
        </button>
<!-- Available Slot -->
<button class="py-3 px-4 rounded-lg border border-border bg-card text-foreground font-medium text-center hover:bg-accent transition-all">
          10:00
        </button>
<!-- Available Slot -->
<button class="py-3 px-4 rounded-lg border border-border bg-card text-foreground font-medium text-center hover:bg-accent transition-all">
          11:00
        </button>
<!-- Available Slot -->
<button class="py-3 px-4 rounded-lg border border-border bg-card text-foreground font-medium text-center hover:bg-accent transition-all">
          13:00
        </button>
<!-- Available Slot -->
<button class="py-3 px-4 rounded-lg border border-border bg-card text-foreground font-medium text-center hover:bg-accent transition-all">
          14:00
        </button>
<!-- Available Slot -->
<button class="py-3 px-4 rounded-lg border border-border bg-card text-foreground font-medium text-center hover:bg-accent transition-all">
          15:00
        </button>
<!-- Available Slot -->
<button class="py-3 px-4 rounded-lg border border-border bg-card text-foreground font-medium text-center hover:bg-accent transition-all">
          16:00
        </button>
<!-- Available Slot -->
<button class="py-3 px-4 rounded-lg border border-border bg-card text-foreground font-medium text-center hover:bg-accent transition-all">
          17:00
        </button>
<!-- Available Slot -->
<button class="py-3 px-4 rounded-lg border border-border bg-card text-foreground font-medium text-center hover:bg-accent transition-all">
          18:00
        </button>
</div>
</section>
<!-- END: TimeSelection -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: FooterAction -->
<footer class="p-4 border-t border-border bg-background/80 backdrop-blur-md">
<div class="max-w-md mx-auto flex flex-col gap-2">
<div class="flex justify-between items-center text-sm px-1 mb-2">
<span class="text-zinc-400">Selecionado:</span>
<span class="font-semibold">Seg, 22 de Mai às 09:00</span>
</div>
<button class="w-full bg-[#EF4444] hover:bg-[#DC2626] text-white font-bold py-4 rounded-xl shadow-lg transition-colors active:scale-[0.98]">
        Próximo
      </button>
</div>
</footer>
<!-- END: FooterAction -->
<script data-purpose="date-interactivity">
    // Minimal script to handle visual toggles if user clicks on dates/times
    // (Actual logic would be handled by a framework, but this provides UI feedback)
    document.querySelectorAll('#date-scroll-container button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#date-scroll-container button').forEach(b => {
          b.classList.remove('border-primary', 'bg-primary/10', 'text-primary');
          b.classList.add('border-border', 'bg-card');
          b.querySelector('span:first-child').classList.add('text-zinc-500');
        });
        btn.classList.add('border-primary', 'bg-primary/10', 'text-primary');
        btn.classList.remove('border-border', 'bg-card');
        btn.querySelector('span:first-child').classList.remove('text-zinc-500');
      });
    });

    document.querySelectorAll('#time-grid button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#time-grid button').forEach(b => {
          b.classList.remove('border-primary', 'bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
          b.classList.add('border-border', 'bg-card', 'text-foreground');
        });
        btn.classList.add('border-primary', 'bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
        btn.classList.remove('border-border', 'bg-card', 'text-foreground');
      });
    });
  </script>
</body></html>
