<script data-purpose="interaction-handlers">
    // Simple logic to count selections for UI feedback
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const totalDisplay = document.getElementById('total-selected');

    checkboxes.forEach(checkbox => {
      checkbox.addEventListener('change', () => {
        const count = document.querySelectorAll('input[type="checkbox"]:checked').length;
        totalDisplay.innerText = `${count} serviço(s) selecionado(s)`;
      });
    });

    document.getElementById('next-button').addEventListener('click', () => {
      const selected = document.querySelectorAll('input[type="checkbox"]:checked');
      if (selected.length === 0) {
        alert('Por favor, selecione pelo menos um serviço.');
      } else {
        // Mock navigation
        console.log('Navigating to step 2 with selected services:', Array.from(selected).map(s => s.value));
      }
    });
  </script>
